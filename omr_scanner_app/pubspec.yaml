name: omr_scanner_app
description: Flutter OMR bubble-sheet scanner that sends images to a FastAPI backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Live camera preview + image capture
  camera: ^0.11.0+2

  # HTTP multipart upload
  http: ^1.2.1

  # MIME type helper for multipart requests
  http_parser: ^4.0.2

  # Premium typography
  google_fonts: ^6.2.1

  # Material icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
